[pytest]
# Pytest configuration for oanda-trading-system

# Disable problematic ROS plugins and configure test output
addopts =
    -p no:launch_testing
    -p no:launch_testing_ros_pytest_entrypoint
    -p no:ament_lint
    -p no:ament_xmllint
    -p no:ament_pep257
    -p no:ament_copyright
    -p no:ament_flake8
    -ra --tb=short

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    performance: Performance tests
