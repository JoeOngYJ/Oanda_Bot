symbols:
  - XAU_USD
entry_timeframes: [M15, M5]
htf_timeframes:
  h1: H1
  d1: D1
timezone: Europe/London

training:
  years: 10
  symbol_batch_size: 1
disable_session_filters: true

exploration:
  max_variants: 24
  top_k: 6
  hybrid_min_per_symbol: 3
  min_trades: 10
  min_window_pass_rate: 0.0
  window_min_trades: 6
  window_dd_cap: 0.20
  regime_router_min_regime_trades: 8
  regime_router_min_mapped_regimes: 1
  objective:
    expectancy_weight: 1.0
    max_dd_penalty: 0.55
    cost_penalty: 0.20
    sharpe_weight: 0.08
    window_pass_weight: 0.22
  regime_variants:
    - id: xau_hyb_v01
      trend_min: 0.54
      range_min: 0.56
      transition_min: 0.50
      exhaustion_extension_atr: 2.0
    - id: xau_hyb_v02
      trend_min: 0.56
      range_min: 0.57
      transition_min: 0.52
      exhaustion_extension_atr: 2.2
    - id: xau_hyb_v03
      trend_min: 0.58
      range_min: 0.58
      transition_min: 0.54
      exhaustion_extension_atr: 2.4

regime:
  drop_last_htf_bar: true
  strict_no_lookahead: true
  hysteresis_enabled: true
  hysteresis_margin: 0.02
  hysteresis_min_confidence: 0.52
  min_regime_bars: 1
  weights:
    h1: 0.6
    d1: 0.4
  thresholds:
    slope_lookback: 5
    swing_window: 20
    swing_break_rate_window: 24
    trend_min: 0.55
    range_min: 0.55
    transition_min: 0.50
    exhaustion_min: 0.55
    regime_margin: 0.03
    transition_contraction_ratio: 0.85
    transition_expansion_ratio: 1.1
    exhaustion_extension_atr: 2.0
    impulse_body_atr: 1.25

sessions:
  tokyo: [0, 9]
  london: [8, 17]
  newyork: [13, 22]
  overlap: [13, 17]

pair_overrides:
  XAU_USD:
    disable_session_filters: true
    preferred_sessions: []
    preferred_styles: [breakout, trend, reversal]
    entry_timeframes: [M15, M5]
    signal_quality: {}
    barrier:
      horizon_bars: 10
      up_atr_mult: 0.9
      down_atr_mult: 0.9
      three_class_labels: true
      neutral_atr_mult: 0.30
    hard_filters:
      expectancy_min: 0.0
      net_expectancy_min: 0.0
      window_pass_min: 0.35
    entry_refinement:
      enabled: true
      apply_timeframes: [M15, M5]
      min_regime_confidence: 0.56
      min_regime_score_margin: 0.03
      confirmation_bars: 2
      min_body_atr: 0.08
      max_atr_norm: 2.5

no_trade:
  enabled: true
  probability_threshold: 0.52
  calibrate_threshold: true
  threshold_grid: [0.50, 0.52, 0.55, 0.58, 0.60]
  min_trades: 10
  max_dd_cap: 0.20
  ece_bins: 10

entry_refinement:
  enabled: true
  apply_timeframes: [M15, M5]
  min_regime_confidence: 0.56
  min_regime_score_margin: 0.03
  confirmation_bars: 2
  min_body_atr: 0.08
  max_atr_norm: 2.5

model: {}
splits:
  folds: 8
  train_ratio: 0.75
barrier: {}
cost:
  horizon_bars: 10
  spread_bps: 1.0
  fee_bps: 0.5

deployment_policy:
  champion_per_symbol: 1
  challenger_per_symbol: 1

output:
  ranking_csv: data/research/regime_strategy_ranking.xau_all_sessions_hybrid.csv
  model_dir: models/research/regime_strategy_xau_all_sessions_hybrid
  manifest_json: data/research/regime_strategy_manifest.xau_all_sessions_hybrid.json
