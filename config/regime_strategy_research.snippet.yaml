# Regime -> strategy routing research config snippet
symbols:
  - EUR_USD
  - GBP_USD
  - USD_JPY
  - USD_CAD
  - GBP_JPY
  - XAU_USD

ltf_timeframe: M15
# Optional multi-timeframe entry exploration. If set, overrides ltf_timeframe.
entry_timeframes: [M15, M5]
htf_timeframes:
  h1: H1
  d1: D1

timezone: Europe/London

exploration:
  max_variants: 16
  top_k: 3
  hybrid_min_per_symbol: 1
  min_trades: 30
  window_min_trades: 12
  min_window_pass_rate: 0.40
  window_dd_cap: 0.15
  objective:
    expectancy_weight: 1.0
    max_dd_penalty: 0.5
    cost_penalty: 0.2
    sharpe_weight: 0.05
    window_pass_weight: 0.2
  # Optional explicit variants (bounded search). If omitted, auto-grid is used.
  regime_variants: []

regime:
  drop_last_htf_bar: true
  strict_no_lookahead: true
  hysteresis_enabled: true
  hysteresis_margin: 0.03
  hysteresis_min_confidence: 0.50
  weights:
    h1: 0.6
    d1: 0.4
  thresholds:
    slope_lookback: 5
    swing_window: 20
    swing_break_rate_window: 24
    trend_min: 0.55
    range_min: 0.55
    transition_min: 0.50
    exhaustion_min: 0.55
    regime_margin: 0.03
    transition_contraction_ratio: 0.85
    transition_expansion_ratio: 1.10
    exhaustion_extension_atr: 2.0
    impulse_body_atr: 1.25

sessions:
  tokyo: [0, 9]
  london: [8, 17]
  newyork: [13, 22]
  overlap: [13, 17]

pair_overrides:
  EUR_USD:
    entry_timeframes: [M15, M5]
    preferred_sessions: [london, overlap]
    preferred_styles: [breakout, trend]
    hard_filters:
      expectancy_min: 0.01
      net_expectancy_min: 0.0
      window_pass_min: 0.45
    barrier:
      horizon_bars: 12
      up_atr_mult: 0.75
      down_atr_mult: 0.75
      three_class_labels: true
      neutral_atr_mult: 0.25
  GBP_USD:
    entry_timeframes: [M15, M5]
    preferred_sessions: [london, overlap]
    preferred_styles: [breakout, reversal]
    hard_filters:
      expectancy_min: 0.01
      net_expectancy_min: 0.0
      window_pass_min: 0.45
  USD_JPY:
    entry_timeframes: [M15, M5]
    preferred_sessions: [tokyo, overlap]
    preferred_styles: [breakout]
    hard_filters:
      expectancy_min: 0.008
      net_expectancy_min: 0.0
      window_pass_min: 0.40
  USD_CAD:
    entry_timeframes: [M15, M5]
    preferred_sessions: [newyork, overlap]
    preferred_styles: [breakout, trend]
    hard_filters:
      expectancy_min: 0.01
      net_expectancy_min: 0.0
      window_pass_min: 0.45
  GBP_JPY:
    entry_timeframes: [M15, M5]
    preferred_sessions: [london, overlap, tokyo]
    preferred_styles: [breakout, trend]
    stricter_filters: true
    hard_filters:
      expectancy_min: 0.015
      net_expectancy_min: 0.005
      window_pass_min: 0.50
  XAU_USD:
    entry_timeframes: [M15, M5]
    preferred_sessions: [london, overlap]
    preferred_styles: [breakout, reversal]
    hard_filters:
      expectancy_min: 0.02
      net_expectancy_min: 0.01
      window_pass_min: 0.50

data_quality:
  max_missing_bar_ratio: 0.02
  max_time_gap_multiple: 3.0
  warn_only: true

no_trade:
  enabled: true
  probability_threshold: 0.58
  calibrate_threshold: true
  threshold_grid: [0.52, 0.55, 0.58, 0.62, 0.66]
  min_trades: 30
  max_dd_cap: 0.20
  ece_bins: 10
  objective:
    expectancy_weight: 1.0
    max_dd_penalty: 0.5
    cost_penalty: 0.2
    sharpe_weight: 0.05
    window_pass_weight: 0.2

macro:
  carry_proxy: 0.0
  event_pre_minutes: 60
  event_post_minutes: 120
  # Optional UTC timestamps. Example:
  # events_utc: ["2026-03-11T13:30:00Z", "2026-03-20T18:00:00Z"]
  events_utc: []
  # Session-aware spread assumptions in bps for cost/slippage proxy features.
  session_spread_bps:
    tokyo: 2.2
    london: 1.4
    newyork: 1.6
    overlap: 1.2
    offhours: 2.6
  slippage_vol_window: 240
  event_slippage_mult: 0.6

entry_refinement:
  enabled: true
  # Apply extra confirmation on micro-entry frames.
  apply_timeframes: [M5, M1]
  min_regime_confidence: 0.56
  min_regime_score_margin: 0.03
  confirmation_bars: 2
  min_body_atr: 0.08
  max_atr_norm: 2.5

risk_controls:
  kill_switch_expectancy_max: 0.0
  kill_switch_sharpe_max: 0.0
  kill_switch_window_pass_max: 0.35

# passed through to existing pipeline functions
model: {}
splits: {}
barrier: {}
cost: {}
# Example dynamic neutral label settings:
# barrier:
#   three_class_labels: true
#   neutral_atr_mult: 0.25
#   dynamic_neutral_enabled: true
#   neutral_vol_window: 240
#   neutral_vol_rank_low: 0.30
#   neutral_vol_rank_high: 0.70
#   neutral_mult_low_vol: 0.18
#   neutral_mult_high_vol: 0.45
#   neutral_mult_event: 0.60
#   event_pre_minutes: 60
#   event_post_minutes: 120
#   event_schedule_utc: []

deployment_policy:
  champion_per_symbol: 1
  challenger_per_symbol: 1
  disable_on_roll_dd: 0.18
  disable_on_window_pass_below: 0.35

output:
  ranking_csv: data/research/regime_strategy_ranking.csv
  model_dir: models/research/regime_strategy
  manifest_json: data/research/regime_strategy_manifest.json
