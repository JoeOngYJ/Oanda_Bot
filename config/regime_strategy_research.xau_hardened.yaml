symbols:
  - XAU_USD
entry_timeframes: [M15, M5]
htf_timeframes:
  h1: H1
  d1: D1
timezone: Europe/London

training:
  years: 10
  symbol_batch_size: 1

exploration:
  max_variants: 8
  top_k: 2
  hybrid_min_per_symbol: 1
  min_trades: 40
  min_window_pass_rate: 0.50
  window_min_trades: 12
  window_dd_cap: 0.12
  objective:
    expectancy_weight: 1.0
    max_dd_penalty: 0.70
    cost_penalty: 0.30
    sharpe_weight: 0.08
    window_pass_weight: 0.30
  regime_variants:
    - id: xau_v01
      trend_min: 0.56
      range_min: 0.58
      transition_min: 0.52
      exhaustion_extension_atr: 2.2
    - id: xau_v02
      trend_min: 0.58
      range_min: 0.58
      transition_min: 0.52
      exhaustion_extension_atr: 2.2
    - id: xau_v03
      trend_min: 0.56
      range_min: 0.60
      transition_min: 0.54
      exhaustion_extension_atr: 2.4
    - id: xau_v04
      trend_min: 0.58
      range_min: 0.60
      transition_min: 0.54
      exhaustion_extension_atr: 2.4

regime:
  drop_last_htf_bar: true
  strict_no_lookahead: true
  hysteresis_enabled: true
  hysteresis_margin: 0.05
  hysteresis_min_confidence: 0.60
  min_regime_bars: 4
  weights:
    h1: 0.65
    d1: 0.35
  thresholds:
    slope_lookback: 5
    swing_window: 20
    swing_break_rate_window: 24
    trend_min: 0.57
    range_min: 0.59
    transition_min: 0.53
    exhaustion_min: 0.58
    regime_margin: 0.04
    transition_contraction_ratio: 0.86
    transition_expansion_ratio: 1.12
    exhaustion_extension_atr: 2.3
    impulse_body_atr: 1.30

sessions:
  tokyo: [0, 9]
  london: [8, 17]
  newyork: [13, 22]
  overlap: [13, 17]

pair_overrides:
  XAU_USD:
    preferred_sessions: [london, overlap]
    preferred_styles: [breakout, reversal]
    entry_timeframes: [M15, M5]
    barrier:
      horizon_bars: 14
      up_atr_mult: 1.0
      down_atr_mult: 1.0
      three_class_labels: true
      neutral_atr_mult: 0.40
    signal_quality:
      allowed_sessions: [london, overlap]
      min_regime_confidence: 0.62
      min_regime_score_margin: 0.06
      max_atr_norm: 1.9
      max_body_atr: 1.6
    hard_filters:
      expectancy_min: 0.00025
      net_expectancy_min: 0.00015
      window_pass_min: 0.55
    entry_refinement:
      enabled: true
      apply_timeframes: [M15, M5]
      min_regime_confidence: 0.62
      min_regime_score_margin: 0.05
      confirmation_bars: 2
      min_body_atr: 0.10
      max_atr_norm: 1.9
    regime:
      hysteresis_enabled: true
      hysteresis_margin: 0.05
      hysteresis_min_confidence: 0.62
      min_regime_bars: 5

no_trade:
  enabled: true
  probability_threshold: 0.62
  calibrate_threshold: true
  threshold_grid: [0.58, 0.60, 0.62, 0.65, 0.68]
  min_trades: 40
  max_dd_cap: 0.18
  ece_bins: 10
  objective:
    expectancy_weight: 1.0
    max_dd_penalty: 0.70
    cost_penalty: 0.30
    sharpe_weight: 0.08
    window_pass_weight: 0.30

entry_refinement:
  enabled: true
  apply_timeframes: [M15, M5]
  min_regime_confidence: 0.60
  min_regime_score_margin: 0.04
  confirmation_bars: 2
  min_body_atr: 0.10
  max_atr_norm: 2.0

risk_controls:
  kill_switch_expectancy_max: 0.0
  kill_switch_sharpe_max: 0.0
  kill_switch_window_pass_max: 0.40

model: {}
splits:
  folds: 8
  train_ratio: 0.75
barrier: {}
cost:
  horizon_bars: 14
  spread_bps: 1.2
  fee_bps: 0.6

deployment_policy:
  champion_per_symbol: 1
  challenger_per_symbol: 1

output:
  ranking_csv: data/research/regime_strategy_ranking.xau_hardened.csv
  model_dir: models/research/regime_strategy_xau_hardened
  manifest_json: data/research/regime_strategy_manifest.xau_hardened.json
