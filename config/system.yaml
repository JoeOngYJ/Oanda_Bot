system:
  environment: "production"
  timezone: "UTC"

redis:
  host: "localhost"
  port: 6379
  db: 0
  streams:
    market_data: "stream:market_data"
    signals: "stream:signals"
    risk_checks: "stream:risk_checks"
    orders: "stream:orders"
    executions: "stream:executions"
    alerts: "stream:alerts"
    execution_control: "stream:execution_control"

influxdb:
  url: "http://localhost:8086"
  token: "${INFLUXDB_TOKEN}"
  org: "trading_org"
  bucket: "market_data"

prometheus:
  port: 8000
  push_gateway: "localhost:9091"

logging:
  level: "INFO"
  format: "json"
  elasticsearch:
    host: "localhost"
    port: 9200
    index_prefix: "trading-logs"
